<div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
  {{ if .is_empty }}
    <p class="text-sm text-slate-500">Your cart is empty.</p>
  {{ else }}
    <p class="text-sm font-semibold text-slate-900">{{ .count }} items</p>
    <p class="text-sm text-slate-600">Subtotal: {{ .subtotal_label }}</p>
  {{ end }}
</div>
