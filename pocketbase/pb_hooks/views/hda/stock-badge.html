{{ if eq .state "available" }}
<span class="rounded-full bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-800">In stock</span>
{{ else if eq .state "low_stock" }}
<span class="rounded-full bg-amber-100 px-3 py-1 text-xs font-semibold text-amber-800">Low stock ({{ .stock }})</span>
{{ else if eq .state "out_of_stock" }}
<span class="rounded-full bg-rose-100 px-3 py-1 text-xs font-semibold text-rose-800">Out of stock</span>
{{ else }}
<span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-700">Unavailable</span>
{{ end }}
